name: VoterBloc
base_url: http://localhost:8080/graphql

auth:
  type: graphql
  query: |
    mutation Login($identifier: String!, $password: String!) {
      login(identifier: $identifier, password: $password) {
        token
        refreshToken
        user { id username firstName lastName }
      }
    }
  token_path: "data.login.token"
  # registerForTest auto-verifies the email and flags the new user with
  # is_test_user=true so a future purgeTestData() admin mutation can wipe
  # synthetic accounts. Landed in VoterBloc/voterbloc#1714.
  register_query: |
    mutation RegisterForTest($input: RegisterInput!) {
      registerForTest(input: $input) {
        token
        user { id username email isTestUser }
      }
    }
  register_token_path: "data.registerForTest.token"
  header_name: Authorization
  header_value: "Bearer {{token}}"

# Maps register_input field names to templates referencing normalized
# identity fields produced by `gollm seed`. Available placeholders:
# {{firstName}}, {{lastName}}, {{email}}, {{username}}, {{password}},
# {{state}}.
persona_register_template:
  email: "{{email}}"
  username: "{{username}}"
  password: "{{password}}"
  firstName: "{{firstName}}"
  lastName: "{{lastName}}"

# Admin operations. purge_query wipes synthetic data between runs by deleting
# every row whose user-axis resolves to is_test_user=true. Gated on the
# TEST_DATA_PURGE feature flag (true on staging) and admin role; landed in
# VoterBloc/voterbloc#1723.
admin:
  identifier_env: VOTERBLOC_ADMIN_EMAIL
  password_env: VOTERBLOC_ADMIN_PASSWORD
  purge_query: |
    mutation PurgeTestData {
      purgeTestData {
        byTable { table deleted }
        total
      }
    }
  purge_result_path: "data.purgeTestData"

# Auto-discover tools from the running schema. Drop a few mutations that
# synthetic users shouldn't touch — auth and admin-only ops.
tools_from_schema: true
tools_exclude:
  - registerForTest
  - login
  - register
  - refreshToken
  - logout
  - purgeTestData

